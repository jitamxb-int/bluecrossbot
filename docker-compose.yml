services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluecross_backend
    env_file: backend/.env
      # Override so the backend reaches Qdrant over the compose network.
    ports:
      - "4020:4020"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: bluecross_frontend
    env_file: frontend/.env
    ports:
      - "4021:80"
    restart: unless-stopped

  admin-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-frontend
    container_name: bluecross_admin_frontend
    env_file: admin-frontend/.env
    ports:
      - "4022:80"
    restart: unless-stopped
    
  upload-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: upload-frontend
    container_name: bluecross_upload_frontend
    env_file: upload-frontend/.env
    ports:
      - "4023:80"
    restart: unless-stopped
