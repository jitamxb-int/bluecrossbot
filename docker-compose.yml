services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    # restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    env_file: .env
    environment:
      # Override so the backend reaches Qdrant over the compose network.
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    ports:
      - "4020:4020"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # restart: unless-stopped

volumes:
  qdrant_storage:
